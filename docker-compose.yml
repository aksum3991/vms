services:
  db:
    image: postgres:16-alpine
    container_name: vms-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  app:
    build: .
    container_name: vms-app
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "127.0.0.1:host-gateway"
      - "localhost:host-gateway"
    environment:
      # Node.js ignores /etc/hosts for bare IP inputs like 127.0.0.1.
      # By passing a hostname (host.docker.internal) here, Node.js resolves it properly to the Windows host.
      AUTH_KEYCLOAK_ISSUER: "http://host.docker.internal:8082/realms/vms"
      KC_ADMIN_BASE: "http://host.docker.internal:8082/admin/realms/vms"
      NODE_ENV: production
    depends_on:
      - db
    ports:
      - "3000:3000"
volumes:
  pgdata:
